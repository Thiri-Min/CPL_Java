# Public LMS (DemoApplication) — deploy at https://render.com
# 1. Sign in with GitHub  2. New → Blueprint  3. Select Thiri-Min/CPL_Java
# 4. After deploy, share the *.onrender.com URL with everyone
services:
  - type: web
    name: cpl-java-lms
    runtime: docker
    rootDir: demo
    dockerfilePath: ./Dockerfile
    plan: free
    # Use /health (lightweight). "/" is slow on cold start.
    healthCheckPath: /health
    healthCheckGracePeriodSeconds: 300
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Free instance has ~512MB RAM; leave headroom for metaspace + native
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx384m -XX:+UseSerialGC
