# Cloud profile for public hosting (Render, Railway, etc.)
# Optional: set SPRING_DATASOURCE_* to use MySQL instead of embedded H2.

server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# In-memory H2 avoids MySQL DDL issues and corrupted files on free-tier redeploys
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
