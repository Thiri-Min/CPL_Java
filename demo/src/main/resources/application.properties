spring.application.name=demo

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/demo_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=march123@H
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Google Analytics 4
app.analytics.ga4-measurement-id=G-9PPGQFYS8J

# AI chatbot — OpenAI (primary) + Google Gemini (free tier backup)
app.ai.openai-api-key=
app.ai.model=gpt-4o-mini
app.ai.gemini-api-key=
app.ai.gemini-model=gemini-2.0-flash
# Built-in answers if both APIs fail
app.ai.fallback-enabled=true

