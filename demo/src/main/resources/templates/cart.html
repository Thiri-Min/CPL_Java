<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            padding: 5rem 0 2rem;
            text-align: center;
        }
        .card-transparent {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: none;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
        }
        .scroll-top-btn {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            z-index: 1200;
            display: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }
        .scroll-top-btn.show {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbarShell(false, false, '', '/home', false, '')}"></nav>

    <section class="page-header">
        <div class="container">
            <h1>Your Cart</h1>
            <p th:if="${cartCount == 0}">Your cart is empty. Explore courses to add the ones you want.</p>
            <p th:if="${cartCount > 0}">You have <span th:text="${cartCount}"></span> course(s) in your cart.</p>
            <div th:if="${message}" class="alert alert-success text-dark mt-3" th:text="${message}"></div>
        </div>
    </section>

    <section class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="card card-transparent p-4">
                    <div th:if="${cartCount == 0}">
                        <h4 class="text-center">No courses have been added yet.</h4>
                        <div class="text-center mt-4">
                            <a href="/courses" class="btn btn-primary"><i class="fas fa-book-open me-2"></i>Browse Courses</a>
                        </div>
                    </div>
                    <div th:if="${cartCount > 0}">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Course</th>
                                    <th>Description</th>
                                    <th>Price</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="course : ${cartItems}">
                                    <td th:text="${course.title}"></td>
                                    <td th:text="${course.description}"></td>
                                    <td>$<span th:text="${course.price}"></span></td>
                                    <td>
                                        <div class="btn-group btn-group-sm" role="group">
                                            <button type="button" class="btn btn-outline-danger" th:onclick="'toggleFavorite(' + ${course.id} + ')'">
                                                <i class="fas fa-heart me-1"></i>Fav
                                            </button>
                                            <button type="button" class="btn btn-outline-primary" th:onclick="'window.location.href=&quot;/course-detail?courseId=' + ${course.id} + '&quot;'">
                                                <i class="fas fa-book-open me-1"></i>Read
                                            </button>
                                            <form th:action="@{/cart/remove}" method="post" style="display: inline;">
                                                <input type="hidden" name="courseId" th:value="${course.id}" />
                                                <button type="submit" class="btn btn-outline-danger"><i class="fas fa-trash-alt"></i></button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <p class="h5 mb-0">Total: $<span th:text="${cartTotal}"></span></p>
                            <a href="/courses" class="btn btn-primary"><i class="fas fa-book-open me-2"></i>Add More Courses</a>
                        </div>
                        <div class="mt-4 p-4 bg-white rounded-4 text-dark">
                            <h4 class="mb-3">Checkout</h4>
                            <form th:action="@{/checkout}" method="post" id="checkoutForm">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Payment method</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCard" value="card" checked onchange="toggleCardFields()">
                                        <label class="form-check-label" for="paymentCard">Card</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="paymentMethod" id="paymentCod" value="cod" onchange="toggleCardFields()">
                                        <label class="form-check-label" for="paymentCod">Cash on Delivery (COD)</label>
                                    </div>
                                </div>
                                <div id="cardFields" class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="cardNumber" class="form-label">Card Number</label>
                                        <input type="text" class="form-control" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="cardExpiry" class="form-label">Expiry</label>
                                        <input type="text" class="form-control" id="cardExpiry" name="cardExpiry" placeholder="MM/YY" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label for="cardCvv" class="form-label">CVV</label>
                                        <input type="text" class="form-control" id="cardCvv" name="cardCvv" placeholder="123" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="billingName" class="form-label">Billing name</label>
                                    <input type="text" class="form-control" id="billingName" name="billingName" placeholder="Name on card or recipient" required>
                                </div>
                                <div class="mb-3">
                                    <label for="billingAddress" class="form-label">Address</label>
                                    <input type="text" class="form-control" id="billingAddress" name="billingAddress" placeholder="Delivery address" required>
                                </div>
                                <button type="submit" class="btn btn-success btn-lg w-100">
                                    <i class="fas fa-check-circle me-2"></i>Place Order
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        const cartCourseList = [
            { id: 1, title: 'SQL Mastery' },
            { id: 2, title: 'Git Essentials' },
            { id: 3, title: 'DSA Fundamentals' },
            { id: 4, title: 'Java Essentials' },
            { id: 5, title: 'Spring Framework' },
            { id: 6, title: 'Mock Project' }
        ];

        let favoriteCourseIds = JSON.parse(localStorage.getItem('favoriteCourseIds') || '[]');

        function toggleFavorite(courseId) {
            const index = favoriteCourseIds.indexOf(courseId);
            if (index >= 0) {
                favoriteCourseIds.splice(index, 1);
            } else {
                favoriteCourseIds.push(courseId);
            }
            localStorage.setItem('favoriteCourseIds', JSON.stringify(favoriteCourseIds));
            alert('Course ' + (index >= 0 ? 'removed from' : 'added to') + ' favorites!');
        }

        function toggleCardFields() {
            const isCard = document.getElementById('paymentCard').checked;
            const cardFields = document.getElementById('cardFields');
            const cardInputs = cardFields.querySelectorAll('input');
            cardFields.style.display = isCard ? 'flex' : 'none';
            cardInputs.forEach(input => {
                if (isCard) {
                    input.removeAttribute('disabled');
                    if (input.required) input.required = true;
                } else {
                    input.setAttribute('disabled', 'disabled');
                    input.required = false;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            toggleCardFields();
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            if (window.scrollY > 200) btn.classList.add('show');
            else btn.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
