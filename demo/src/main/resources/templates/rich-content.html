<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Content - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            backdrop-filter: blur(8px);
            background: rgba(27, 38, 59, 0.35) !important;
        }
        .page-header {
            padding: 4rem 0 2rem;
            text-align: center;
        }
        .topic-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: none;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            text-decoration: none;
            display: block;
        }
        .topic-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
            color: #333;
        }
        .topic-icon {
            font-size: 3.5rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-graduation-cap me-2"></i>LMS</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="/home">Home</a>
                <a class="nav-link" href="/courses">Courses</a>
                <a class="nav-link" href="/tech">Tech Tests</a>
                <a class="nav-link active" href="/rich-content">Rich Content</a>
                <a class="nav-link position-relative" href="/cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${cartCount > 0}" th:text="${cartCount}"></span>
                </a>
                <span class="nav-link">Hello, <span th:text="${user.firstName}"></span></span>
                <a class="nav-link" href="/profile"><i class="fas fa-user-circle me-1"></i>Profile</a>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Rich Content Library</h1>
            <p class="lead mb-0">Curated PDFs, guides, and videos from trusted platforms for each technology track.</p>
        </div>
    </section>

    <section class="container pb-5 flex-grow-1">
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="t : ${topics}">
                <a th:href="@{/rich-content/detail(topic=${t.id})}" class="topic-card p-4 text-center">
                    <i th:class="${t.icon} + ' topic-icon'"></i>
                    <h4 th:text="${t.title}">Title</h4>
                    <p class="text-muted small mb-3" th:text="${t.description}">Description</p>
                    <span class="badge bg-primary">
                        <i class="fas fa-book-open me-1"></i>
                        <span th:text="${#lists.size(t.materials)} + ' resources'">0 resources</span>
                    </span>
                </a>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
