<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${topic.title} + ' - Rich Content'">Rich Content Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            backdrop-filter: blur(8px);
            background: rgba(27, 38, 59, 0.35) !important;
        }
        .detail-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin: 2rem auto 3rem;
            max-width: 900px;
        }
        .topic-logo {
            font-size: 4.5rem;
            color: #667eea;
        }
        .material-card {
            border: 1px solid #e9ecef;
            border-radius: 14px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            background: #fff;
        }
        .material-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }
        .material-type-pdf { color: #dc3545; }
        .material-type-video { color: #0d6efd; }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand" href="/home"><i class="fas fa-graduation-cap me-2"></i>LMS</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" href="/rich-content"><i class="fas fa-arrow-left me-1"></i>All Topics</a>
                <a class="nav-link" href="/home">Home</a>
                <a class="nav-link" href="/tech">Tech Tests</a>
                <span class="nav-link">Hello, <span th:text="${user.firstName}"></span></span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1">
        <div class="detail-card">
            <div class="text-center mb-4">
                <i th:class="${topic.icon} + ' topic-logo'"></i>
                <h1 class="mt-3 mb-2" th:text="${topic.title}">Topic</h1>
                <p class="text-muted lead" th:text="${topic.description}">Description</p>
            </div>

            <h4 class="mb-3"><i class="fas fa-file-pdf material-type-pdf me-2"></i>Documents &amp; Guides</h4>
            <div th:each="m : ${topic.materials}" th:if="${m.type == 'pdf'}">
                <div class="material-card d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <div>
                        <h5 class="mb-1" th:text="${m.title}">Title</h5>
                        <span class="badge bg-light text-dark" th:text="${m.platform}">Platform</span>
                    </div>
                    <a th:href="${m.url}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-danger">
                        <i class="fas fa-external-link-alt me-1"></i>Open PDF / Guide
                    </a>
                </div>
            </div>

            <h4 class="mb-3 mt-4"><i class="fas fa-play-circle material-type-video me-2"></i>Videos</h4>
            <div th:each="m : ${topic.materials}" th:if="${m.type == 'video'}">
                <div class="material-card d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <div>
                        <h5 class="mb-1" th:text="${m.title}">Title</h5>
                        <span class="badge bg-light text-dark" th:text="${m.platform}">Platform</span>
                    </div>
                    <a th:href="${m.url}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary">
                        <i class="fas fa-external-link-alt me-1"></i>Watch Video
                    </a>
                </div>
            </div>

            <div class="text-center mt-4 pt-3 border-top">
                <a href="/rich-content" class="btn btn-secondary me-2"><i class="fas fa-th-large me-1"></i>Back to Library</a>
                <a href="/tech" class="btn btn-primary"><i class="fas fa-clipboard-check me-1"></i>Take Skill Test</a>
            </div>
        </div>
    </div>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
