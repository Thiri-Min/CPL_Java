<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1100;
            backdrop-filter: blur(8px);
            background: rgba(27, 38, 59, 0.35) !important;
        }
        .confirmation-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
        }
        .scroll-top-btn {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            z-index: 1200;
            display: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }
        .scroll-top-btn.show {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand" href="/home">
                <i class="fas fa-graduation-cap me-2"></i>LMS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link" href="/home">Home</a>
                    <a class="nav-link" href="/courses">Courses</a>
                    <a class="nav-link" href="/tech">Tech</a>
                    <a class="nav-link" href="/cart">Cart</a>
                    <span class="nav-link text-white" th:if="${user}">Hello, <span th:text="${user.firstName}"></span></span>
                    <a class="nav-link" href="/logout" th:if="${user}">Logout</a>
                    <a class="nav-link" href="/login" th:if="${user == null}">Login</a>
                    <a class="nav-link" href="/profile" th:if="${user}">
                        <i class="fas fa-user-circle me-1"></i>Profile
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card confirmation-card p-5">
                    <div class="text-center mb-4">
                        <h1 class="mb-3">Order Confirmed</h1>
                        <p class="text-muted">Thank you, <span th:text="${billingName}"></span>! Your order has been placed.</p>
                        <p class="mb-0">Payment method: <strong th:text="${paymentMethod}"></strong></p>
                        <p class="mt-2 text-success" th:text="${paymentSummary}"></p>
                        <p class="mt-2 text-muted" th:text="${orderMessage}"></p>
                    </div>

                    <div class="mb-4">
                        <h5>Billing Address</h5>
                        <p class="mb-0" th:text="${billingAddress}"></p>
                    </div>

                    <div class="mb-4">
                        <h5>Order Summary</h5>
                        <ul class="list-group mb-3">
                            <li class="list-group-item d-flex justify-content-between align-items-center" th:each="course : ${orderItems}">
                                <span th:text="${course.title}"></span>
                                <span>$<span th:text="${course.price}"></span></span>
                            </li>
                        </ul>
                        <div class="d-flex justify-content-between align-items-center">
                            <strong>Total paid</strong>
                            <strong>$<span th:text="${orderTotal}"></span></strong>
                        </div>
                    </div>

                    <div class="text-center">
                        <a href="/courses" class="btn btn-primary btn-lg"><i class="fas fa-book-open me-2"></i>Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>

    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            if (window.scrollY > 200) btn.classList.add('show');
            else btn.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
