<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Learning - Mentor Sessions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .page-header { padding: 4rem 0 2rem; text-align: center; }
        .mentor-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            padding: 1.5rem;
            height: 100%;
            transition: transform 0.3s ease;
        }
        .mentor-card:hover { transform: translateY(-6px); }
        .mentor-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 1rem;
        }
        .position-badge {
            background: #e7f1ff;
            color: #0d6efd;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .site-footer { background: rgba(17, 24, 39, 0.45); margin-top: auto; }
    </style>
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbarShell(false, false, 'mentoring', '/home', false, '')}"></nav>

    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-users me-2"></i>Interactive Learning</h1>
            <p class="lead mb-0">Book a consultation session with our Technical Trainers or send them a message.</p>
        </div>
    </section>

    <section class="container pb-5 flex-grow-1">
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="mentor : ${mentors}">
                <div class="mentor-card text-center">
                    <div class="mentor-avatar">
                        <i th:class="${mentor.iconClass}"></i>
                    </div>
                    <h4 th:text="${mentor.name}">Mentor</h4>
                    <span class="badge position-badge mb-2" th:text="${mentor.position}">Technical Trainer</span>
                    <p class="text-muted small mb-2" th:text="${mentor.expertise}">Expertise</p>
                    <p class="small mb-3" th:text="${mentor.bio}">Bio</p>
                    <p class="mb-3">
                        <span class="badge bg-success">
                            <i class="fas fa-clock me-1"></i>
                            <span th:text="${availableCounts[mentor.id]} + ' slots available'">0 slots</span>
                        </span>
                    </p>
                    <a th:href="@{/mentoring/mentor(mentorId=${mentor.id})}" class="btn btn-primary w-100">
                        <i class="fas fa-calendar-check me-1"></i>Book &amp; Chat
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
