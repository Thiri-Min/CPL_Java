<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .page-header {
            padding: 4rem 0 1.5rem;
            text-align: center;
        }
        .feedback-card {
            background: rgba(255, 255, 255, 0.97);
            color: #333;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 2rem;
            max-width: 640px;
            margin: 0 auto 3rem;
        }
        .feedback-card .form-label {
            font-weight: 600;
            color: #475569;
        }
        .btn-send {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.65rem 1.75rem;
            border-radius: 10px;
        }
        .btn-send:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
            margin-top: auto;
        }
    </style>
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbarShell(false, false, '', '/home', false, 'feedback')}"></nav>

    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-comment-dots me-2"></i>Feedback</h1>
            <p class="lead mb-0">Share your thoughts, suggestions, or issues with us.</p>
        </div>
    </section>

    <section class="container flex-grow-1">
        <div class="feedback-card">
            <div th:if="${feedbackError}" class="alert alert-danger" th:text="${feedbackError}"></div>

            <form th:action="@{/feedback}" method="post" id="feedbackForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required maxlength="120"
                           th:value="${formName != null} ? ${formName} : ${defaultName}"
                           placeholder="Your name">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required maxlength="255"
                           th:value="${formEmail != null} ? ${formEmail} : ${defaultEmail}"
                           placeholder="you@example.com">
                </div>
                <div class="mb-4">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required maxlength="2000"
                              th:text="${formMessage}"
                              placeholder="Tell us what you think..."></textarea>
                </div>
                <button type="submit" class="btn btn-send">
                    <i class="fas fa-paper-plane me-2"></i>Send
                </button>
            </form>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>

    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 bg-success text-white">
                    <h5 class="modal-title" id="successModalLabel">
                        <i class="fas fa-check-circle me-2"></i>Feedback sent successfully
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4 text-center">
                    <i class="fas fa-envelope-circle-check fa-3x text-success mb-3"></i>
                    <p class="mb-0 text-muted">Thank you! Your feedback has been saved. Our team will review it soon.</p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-success px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const showSuccess = /*[[${feedbackSuccess}]]*/ false;
        if (showSuccess) {
            const modal = new bootstrap.Modal(document.getElementById('successModal'));
            modal.show();
        }
    </script>
</body>
</html>
