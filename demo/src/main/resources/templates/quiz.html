<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - <span th:text="${subject}"></span> <span th:text="${level}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            backdrop-filter: blur(8px);
            background: rgba(27, 38, 59, 0.35) !important;
        }
        .quiz-container {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 2rem;
            margin: 2rem auto;
            max-width: 800px;
        }
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545;
        }
        .question {
            margin-bottom: 2rem;
        }
        .options {
            margin-bottom: 1rem;
        }
        .option {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            background: #e9ecef;
        }
        .option.selected {
            background: #007bff;
            color: white;
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
            margin-top: auto;
        }
        .review-item {
            text-align: left;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .review-item.correct {
            background: #d1e7dd;
            border: 1px solid #198754;
        }
        .review-item.incorrect {
            background: #f8d7da;
            border: 1px solid #dc3545;
        }
        .quiz-hint {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand" href="/home">
                <i class="fas fa-graduation-cap me-2"></i>LMS
            </a>
            <div class="navbar-nav ms-auto align-items-center">
                <span class="nav-link text-white">Quiz: <span th:text="${subject}"></span> - <span th:text="${level}"></span></span>
                <span class="nav-link text-white timer" id="timer">20:00</span>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1">
        <div class="quiz-container">
            <div id="questionContainer">
                <!-- Questions will be loaded here -->
            </div>
            <p class="quiz-hint text-center mb-2" id="answerHint">Select an answer to continue.</p>
            <div class="d-flex justify-content-between align-items-center mt-4">
                <button type="button" id="prevBtn" class="btn btn-secondary invisible" aria-hidden="true">Previous</button>
                <span id="questionNumber">Question 1 of 10</span>
                <button type="button" id="nextBtn" class="btn btn-primary">Next</button>
            </div>
        </div>
    </div>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>

    <script th:inline="javascript">
        let currentQuestion = 0;
        const questions = /*[[${questions}]]*/ [];
        const subject = /*[[${subject}]]*/ 'Tech';
        const level = /*[[${level}]]*/ '';
        let answers = new Array(questions.length).fill(null);
        let timeLeft = level === 'Pre-Intermediate' ? 15 * 60 : 20 * 60;
        let quizSubmitted = false;
        let timerActive = true;

        function hasAnswered(index) {
            return answers[index] !== null && answers[index] !== undefined;
        }

        function countUnanswered() {
            return answers.filter(a => a === null || a === undefined).length;
        }

        function updateTimer() {
            if (!timerActive) return;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            } else {
                submitQuiz(true);
            }
        }

        function updateNavigation() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const isFirst = currentQuestion === 0;
            const isLast = currentQuestion === questions.length - 1;

            prevBtn.classList.toggle('invisible', isFirst);
            prevBtn.setAttribute('aria-hidden', isFirst ? 'true' : 'false');
            prevBtn.disabled = isFirst;

            nextBtn.textContent = isLast ? 'Finish' : 'Next';
            nextBtn.classList.toggle('btn-success', isLast);
            nextBtn.classList.toggle('btn-primary', !isLast);
        }

        function loadQuestion(index) {
            const totalQuestions = questions.length;
            const question = questions[index];
            const container = document.getElementById('questionContainer');
            container.innerHTML = `
                <div class="question">
                    <h4>${index + 1}. ${question.question}</h4>
                    <div class="options">
                        ${question.options.map((option, i) => `
                            <div class="option ${answers[index] === i ? 'selected' : ''}" data-index="${i}" onclick="selectOption(${i})">
                                ${String.fromCharCode(65 + i)}. ${option}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('questionNumber').textContent = `Question ${index + 1} of ${totalQuestions}`;
            document.getElementById('answerHint').textContent = hasAnswered(index)
                ? 'You may go to the next question or go back to review.'
                : 'Select an answer before continuing — you cannot skip this question.';
            updateNavigation();
        }

        function selectOption(optionIndex) {
            answers[currentQuestion] = optionIndex;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.classList.toggle('selected', i === optionIndex);
            });
            document.getElementById('answerHint').textContent = 'You may go to the next question or go back to review.';
        }

        function requireCurrentAnswer() {
            if (!hasAnswered(currentQuestion)) {
                alert('Please select an answer before continuing. You cannot skip a question.');
                return false;
            }
            return true;
        }

        function confirmAndSubmit() {
            if (!requireCurrentAnswer()) return;

            const unanswered = countUnanswered();
            let message = 'Have you completed all questions and want to submit?';
            if (unanswered > 0) {
                message = `You still have ${unanswered} unanswered question(s). Have you completed all questions and want to submit anyway?`;
            }

            if (confirm(message)) {
                submitQuiz(false);
            }
        }

        function buildReviewHtml() {
            return questions.map((q, i) => {
                const userIdx = answers[i];
                const correctIdx = q.answer;
                const isCorrect = userIdx === correctIdx;
                const userText = userIdx !== null && userIdx !== undefined
                    ? `${String.fromCharCode(65 + userIdx)}. ${q.options[userIdx]}`
                    : 'No answer selected';
                const correctText = `${String.fromCharCode(65 + correctIdx)}. ${q.options[correctIdx]}`;
                return `
                    <div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <strong>Question ${i + 1}</strong>
                            <span class="badge ${isCorrect ? 'bg-success' : 'bg-danger'}">${isCorrect ? 'Correct' : 'Incorrect'}</span>
                        </div>
                        <p class="mb-2"><strong>Question:</strong> ${q.question}</p>
                        <p class="mb-1 text-success"><strong>Correct answer:</strong> ${correctText}</p>
                        <p class="mb-0"><strong>Your answer:</strong> ${userText}</p>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
            }
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (!requireCurrentAnswer()) return;

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
            } else {
                confirmAndSubmit();
            }
        });

        function submitQuiz(timeUp) {
            if (quizSubmitted) return;
            quizSubmitted = true;
            timerActive = false;

            const total = questions.length || 10;
            let score = 0;
            answers.forEach((answer, i) => {
                if (answer === questions[i].answer) score++;
            });
            const percentage = total > 0 ? Math.round((score / total) * 100) : 0;

            let grade = 'F';
            let message = '';
            if (percentage >= 90) {
                grade = 'A';
                message = `Excellent work on ${subject} ${level}! You demonstrate strong mastery of the material.`;
            } else if (percentage >= 80) {
                grade = 'B';
                message = `Very good ${subject} performance. Review the questions below and polish any gaps.`;
            } else if (percentage >= 70) {
                grade = 'C';
                message = `Solid ${subject} foundation at ${level} level. Study the review below before retaking.`;
            } else if (percentage >= 60) {
                grade = 'D';
                message = `Fair attempt. Focus on core ${subject} concepts highlighted in the review.`;
            } else {
                grade = 'F';
                message = `Keep practicing ${subject} basics. Use the review below and try again when ready.`;
            }

            const timeUpNote = timeUp
                ? '<p class="text-warning"><i class="fas fa-clock me-1"></i>Time is up — your quiz was submitted automatically.</p>'
                : '';

            document.querySelector('.quiz-container').innerHTML = `
                <div class="text-center mb-4">
                    <h2>Quiz Completed!</h2>
                    <p class="text-muted mb-2">${subject} · ${level}</p>
                    ${timeUpNote}
                    <h1 class="display-4 text-primary mb-2">${grade}</h1>
                    <h3>Your Score: ${score}/${total} (${percentage}%)</h3>
                    <p class="mt-3 lead">${message}</p>
                </div>
                <hr>
                <h4 class="mb-3">Question Review</h4>
                <div class="review-list" style="max-height: 420px; overflow-y: auto;">
                    ${buildReviewHtml()}
                </div>
                <div class="text-center mt-4">
                    <a href="/tech" class="btn btn-primary btn-lg">Back to Tech Tests</a>
                </div>
            `;
        }

        updateTimer();
        loadQuestion(0);
    </script>
</body>
</html>
