<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1100;
            backdrop-filter: blur(8px);
            background: rgba(27, 38, 59, 0.35) !important;
        }
        .page-header {
            padding: 5rem 0 2rem;
            text-align: center;
        }
        .course-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-8px);
        }
        .course-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .nav-link { color: rgba(255,255,255,0.85); }
        .nav-link:hover { color: #fff; }
        .btn-course {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border: none;
            border-radius: 25px;
            color: white;
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
        }
        .scroll-top-btn {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            z-index: 1200;
            display: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }
        .scroll-top-btn.show {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand" href="/home">
                <i class="fas fa-graduation-cap me-2"></i>LMS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="navbar-nav ms-auto align-items-center">
                    <a class="nav-link" href="/home">Home</a>
                    <a class="nav-link active" href="/courses">Courses</a>
                    <a class="nav-link" href="/tech">Tech</a>
                    <a class="nav-link position-relative" href="/cart">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:if="${cartCount > 0}" th:text="${cartCount}"></span>
                    </a>
                    <span class="nav-link text-white" th:if="${user}">Hello, <span th:text="${user.firstName}"></span></span>
                    <a class="nav-link" href="/logout" th:if="${user}">Logout</a>
                    <a class="nav-link" href="/#authBox" th:if="${user == null}">Login</a>
                    <a class="nav-link" href="/profile" th:if="${user}">
                        <i class="fas fa-user-circle me-1"></i>Profile
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Available Courses</h1>
            <p>Choose the courses you want to add to your learning cart.</p>
            <div th:if="${message}" class="alert alert-success text-dark mt-3" th:text="${message}"></div>
        </div>
    </section>

    <section class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4" th:each="course : ${courses}">
                <div class="card course-card p-4 text-center h-100 d-flex flex-column">
                    <i class="" th:classappend="${course.icon} + ' course-icon'"></i>
                    <h3 th:text="${course.title}"></h3>
                    <p th:text="${course.description}"></p>
                    <div class="mt-auto d-grid gap-2">
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="courseId" th:value="${course.id}" />
                            <button type="submit" class="btn btn-course w-100"><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>
                        </form>
                        <button type="button" class="btn btn-outline-danger w-100"
                                th:id="'favBtn-' + ${course.id}"
                                th:attr="data-course-id=${course.id}, data-course-title=${course.title}"
                                onclick="toggleFavorite(this.dataset.courseId, this.dataset.courseTitle)">
                            <i class="fas fa-heart me-2"></i><span class="fav-text">Fav</span>
                        </button>
                        <button type="button" class="btn btn-outline-primary w-100" th:onclick="'window.location.href=&quot;/course-detail?courseId=' + ${course.id} + '&quot;'">
                            <i class="fas fa-book-open me-2"></i>Read
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        let favoriteCourseIds = JSON.parse(localStorage.getItem('favoriteCourseIds') || '[]').map(String);

        function toggleFavorite(courseId, courseTitle) {
            courseId = String(courseId);
            const index = favoriteCourseIds.indexOf(courseId);
            if (index >= 0) {
                favoriteCourseIds.splice(index, 1);
            } else {
                favoriteCourseIds.push(courseId);
            }
            localStorage.setItem('favoriteCourseIds', JSON.stringify(favoriteCourseIds));
            updateFavoriteButtons();

            const body = new URLSearchParams();
            body.append('courseId', courseId);
            if (courseTitle) body.append('courseTitle', courseTitle);
            fetch('/api/favorites/toggle', { method: 'POST', body: body }).catch(() => {});
        }

        function syncFavoritesToServer() {
            if (!favoriteCourseIds.length) return;
            const body = new URLSearchParams();
            body.append('courseIds', JSON.stringify(favoriteCourseIds));
            fetch('/api/favorites/sync', { method: 'POST', body: body }).catch(() => {});
        }

        function updateFavoriteButtons() {
            const favorites = favoriteCourseIds.map(String);
            document.querySelectorAll('[id^="favBtn-"]').forEach(btn => {
                const id = btn.dataset.courseId || btn.id.replace('favBtn-', '');
                const text = btn.querySelector('.fav-text');
                if (favorites.includes(String(id))) {
                    btn.classList.remove('btn-outline-danger');
                    btn.classList.add('btn-danger');
                    if (text) text.textContent = 'Unfav';
                } else {
                    btn.classList.remove('btn-danger');
                    btn.classList.add('btn-outline-danger');
                    if (text) text.textContent = 'Fav';
                }
            });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('DOMContentLoaded', function() {
            updateFavoriteButtons();
            syncFavoritesToServer();
        });

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            if (window.scrollY > 200) btn.classList.add('show');
            else btn.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
