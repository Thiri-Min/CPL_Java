<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .page-header {
            padding: 5rem 0 2rem;
            text-align: center;
        }
        .course-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-8px);
        }
        .course-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .btn-course {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border: none;
            border-radius: 25px;
            color: white;
        }
        .site-footer {
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(8px);
        }
        .scroll-top-btn {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            z-index: 1200;
            display: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }
        .scroll-top-btn.show {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .cart-success-modal .modal-content {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.25);
        }
        .cart-success-modal .modal-header {
            border-bottom: none;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }
        .cart-success-modal .modal-title {
            font-weight: 700;
            letter-spacing: 0.01em;
        }
        .cart-success-modal .modal-body {
            color: #1f2937;
            font-size: 1rem;
            padding-top: 1.25rem;
        }
        .cart-success-modal .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 185, 129, 0.12);
            color: #059669;
            font-size: 1.35rem;
            margin-bottom: 0.85rem;
        }
        .cart-success-modal .modal-footer {
            border-top: none;
            gap: 0.5rem;
        }
        .btn-view-cart {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
        }
        .btn-view-cart:hover {
            color: #fff;
            filter: brightness(0.95);
        }
    </style>
    <th:block th:replace="~{fragments/navbar :: navbarStyles}"></th:block>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbarShell(false, true, '', '/home', false, '')}"></nav>

    <section class="page-header">
        <div class="container">
            <h1>Available Courses</h1>
            <p>Choose the courses you want to add to your learning cart.</p>
        </div>
    </section>

    <section class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4" th:each="course : ${courses}">
                <div class="card course-card p-4 text-center h-100 d-flex flex-column">
                    <i class="" th:classappend="${course.icon} + ' course-icon'"></i>
                    <h3 th:text="${course.title}"></h3>
                    <p th:text="${course.description}"></p>
                    <div class="mt-auto d-grid gap-2">
                        <form th:action="@{/cart/add}" method="post">
                            <input type="hidden" name="courseId" th:value="${course.id}" />
                            <button type="submit" class="btn btn-course w-100"><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>
                        </form>
                        <button type="button" class="btn btn-outline-danger w-100"
                                th:id="'favBtn-' + ${course.id}"
                                th:attr="data-course-id=${course.id}, data-course-title=${course.title}"
                                onclick="toggleFavorite(this.dataset.courseId, this.dataset.courseTitle)">
                            <i class="fas fa-heart me-2"></i><span class="fav-text">Fav</span>
                        </button>
                        <button type="button" class="btn btn-outline-primary w-100" th:onclick="'window.location.href=&quot;/course-detail?courseId=' + ${course.id} + '&quot;'">
                            <i class="fas fa-book-open me-2"></i>Read
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="site-footer text-white">
        <div class="container py-4 text-center">
            <p class="mb-0">&copy; 2026 Learning Management System. All rights reserved.</p>
        </div>
    </footer>
    <div class="modal fade cart-success-modal" id="cartSuccessModal" tabindex="-1" aria-labelledby="cartSuccessTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cartSuccessTitle"><i class="fas fa-cart-check me-2"></i>Added to Cart</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div class="icon-wrap mx-auto">
                        <i class="fas fa-check"></i>
                    </div>
                    <p id="cartSuccessMessage" class="mb-0">Course added to cart.</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Continue Shopping</button>
                    <a href="/cart" class="btn btn-view-cart">View Cart</a>
                </div>
            </div>
        </div>
    </div>
    <button id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        let favoriteCourseIds = JSON.parse(localStorage.getItem('favoriteCourseIds') || '[]').map(String);

        function toggleFavorite(courseId, courseTitle) {
            courseId = String(courseId);
            const index = favoriteCourseIds.indexOf(courseId);
            if (index >= 0) {
                favoriteCourseIds.splice(index, 1);
            } else {
                favoriteCourseIds.push(courseId);
            }
            localStorage.setItem('favoriteCourseIds', JSON.stringify(favoriteCourseIds));
            updateFavoriteButtons();

            const body = new URLSearchParams();
            body.append('courseId', courseId);
            if (courseTitle) body.append('courseTitle', courseTitle);
            fetch('/api/favorites/toggle', { method: 'POST', body: body }).catch(() => {});
        }

        function syncFavoritesToServer() {
            if (!favoriteCourseIds.length) return;
            const body = new URLSearchParams();
            body.append('courseIds', JSON.stringify(favoriteCourseIds));
            fetch('/api/favorites/sync', { method: 'POST', body: body }).catch(() => {});
        }

        function updateFavoriteButtons() {
            const favorites = favoriteCourseIds.map(String);
            document.querySelectorAll('[id^="favBtn-"]').forEach(btn => {
                const id = btn.dataset.courseId || btn.id.replace('favBtn-', '');
                const text = btn.querySelector('.fav-text');
                if (favorites.includes(String(id))) {
                    btn.classList.remove('btn-outline-danger');
                    btn.classList.add('btn-danger');
                    if (text) text.textContent = 'Unfav';
                } else {
                    btn.classList.remove('btn-danger');
                    btn.classList.add('btn-outline-danger');
                    if (text) text.textContent = 'Fav';
                }
            });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('DOMContentLoaded', function() {
            updateFavoriteButtons();
            syncFavoritesToServer();
            const params = new URLSearchParams(window.location.search);
            const message = params.get('message');
            if (message) {
                const msgEl = document.getElementById('cartSuccessMessage');
                if (msgEl) msgEl.textContent = message;
                const modalEl = document.getElementById('cartSuccessModal');
                if (modalEl && window.bootstrap) {
                    new bootstrap.Modal(modalEl).show();
                }
                params.delete('message');
                const newQuery = params.toString();
                const cleanUrl = window.location.pathname + (newQuery ? `?${newQuery}` : '');
                window.history.replaceState({}, '', cleanUrl);
            }
        });

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            if (window.scrollY > 200) btn.classList.add('show');
            else btn.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
