        function shuffleArray(items) {
            const arr = [...items];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        /** Picks count questions in random order and shuffles each question's options. */
        function randomizeQuizSet(questions, count = GIT_QUIZ_SIZE) {
            if (!questions || !questions.length) return [];
            const picked = shuffleArray(questions).slice(0, Math.min(count, questions.length));
            return picked.map((q) => {
                const answerIdx = q.answer !== undefined ? q.answer : q.correct;
                const options = shuffleArray(q.options);
                const correctText = q.options[answerIdx];
                return {
                    question: q.question,
                    options,
                    answer: options.indexOf(correctText),
                    correct: options.indexOf(correctText)
                };
            });
        }

                options: ["It allows true parallel threads for CPU-bound tasks", "It prevents multiple native threads from executing Python bytecodes at the same time", "It optimizes memory usage", "It is only active in Python 2"],
                correct: 1,
                explanation: "The Global Interpreter Lock ensures only one thread executes Python bytecode at a time in CPython."
            },
            {
                question: "What is the output of [x*x for x in range(3)]?",
                options: ["[0, 1, 4]", "[1, 4, 9]", "[0, 1, 2]", "Error"],
                correct: 0,
                explanation: "The list comprehension squares each number in the range, producing [0, 1, 4]."
            }
        ];

        let currentQuestionIndex = 0;
        let currentQuizQuestions = [];
        let currentLevel = '';
        let currentSubject = '';
        let userAnswers = [];
        let timer;
        let timeLeft = 0;

        document.addEventListener('DOMContentLoaded', function() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            const levelsContainer = document.getElementById('levelsContainer');

            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const filter = this.getAttribute('data-filter');

                    // Update active button
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    // Populate levels
                    levelsContainer.innerHTML = '';
                    if (filter === 'all') {
                        // For all, show a message or nothing
                        levelsContainer.innerHTML = '<div class="col-12 text-center"><p class="text-muted">Select a specific technology to view available test levels.</p></div>';
                    } else {
                        const data = testData[filter];
                        Object.entries(data.levels).forEach(([level, desc]) => {
                            const levelCard = document.createElement('div');
                            levelCard.className = 'col-md-4';
                            levelCard.innerHTML = `
                                <div class="card h-100 border-0 shadow-sm">
                                    <div class="card-body text-center">
                                        <i class="${data.icon} test-icon"></i>
                                        <h5 class="card-title">${level}</h5>
                                        <p class="card-text">${desc}</p>
                                        <button class="btn btn-primary start-test-btn" data-subject="${filter}" data-level="${level}">Start Test</button>
                                    </div>
                                </div>
                            `;
                            levelsContainer.appendChild(levelCard);
                        });
                    }
                });
            });

            // Add event listeners for start test buttons
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('start-test-btn')) {
                    const subject = e.target.getAttribute('data-subject');
                    const level = e.target.getAttribute('data-level');
                    startQuiz(subject, level);
                }
            });

            // Trigger initial load for Java
            document.querySelector('.filter-btn.active').click();
        });

        function normalizeLevel(level, subject) {
            const tiers = ['Pre-Intermediate', 'Intermediate', 'Advanced'];
            for (const tier of tiers) {
                if (level === tier || level.endsWith(tier)) {
                    return tier;
                }
            }
            return level;
        }

        function startQuiz(subject, level) {
            const normalizedLevel = normalizeLevel(level, subject);
            const tiers = ['Pre-Intermediate', 'Intermediate', 'Advanced'];
            if (tiers.includes(normalizedLevel)) {
                window.location.href = `/quiz?subject=${encodeURIComponent(subject)}&level=${encodeURIComponent(normalizedLevel)}&fresh=1`;
                return;
            }
            alert(`Quiz for ${subject} ${level} is not available yet.`);
        }

        function _startQuizInlineRemoved(subject, level) {
            return;
            if (false && ['Java', 'Python'].includes(subject) && ['Pre-Intermediate', 'Intermediate', 'Advanced'].includes(level)) {
                const levelTitle = level;
                const duration = level === 'Pre-Intermediate' ? 15 * 60 : 20 * 60;
                const badgeClass = level === 'Pre-Intermediate' ? 'bg-warning' : 'bg-info';
                const questionData = getQuestionSet(subject, level);

                if (!questionData) {
                    alert(`Quiz for ${subject} ${level} is not available yet.`);
                    return;
                }

                currentQuizQuestions = questionData;
                currentLevel = level;
                currentSubject = subject;
                currentQuestionIndex = 0;
                userAnswers = new Array(currentQuizQuestions.length).fill(null);
                timeLeft = duration;

                // Hide main content and show quiz
                document.querySelector('.page-header').style.display = 'none';
                document.querySelector('section.container').style.display = 'none';
                document.querySelector('footer').style.display = 'none';

                // Create quiz interface
                const quizContainer = document.createElement('div');
                quizContainer.id = 'quiz-container';
                quizContainer.className = 'container py-5';
                quizContainer.innerHTML = `
                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="card test-card p-4">
                                <div class="card-header bg-primary text-white text-center">
                                    <h3><i class="fab fa-${subject.toLowerCase()} me-2"></i>${subject} ${levelTitle} Test</h3>
                                    <div class="mt-2">
                                        <span class="badge bg-light text-dark me-2">10 Questions</span>
                                        <span class="badge bg-light text-dark me-2">${Math.floor(duration / 60)} Minutes</span>
                                        <span id="timer" class="badge ${badgeClass} text-dark">${formatTime(timeLeft)}</span>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div id="question-container">
                                        <!-- Questions will be loaded here -->
                                    </div>
                                </div>
                                <div class="card-footer text-center">
                                    <button id="prev-btn" class="btn btn-secondary me-2" disabled>
                                        <i class="fas fa-arrow-left me-1"></i>Previous
                                    </button>
                                    <span class="mx-3">Question <span id="current-question">1</span> of ${currentQuizQuestions.length}</span>
                                    <button id="next-btn" class="btn btn-primary">
                                        Next<i class="fas fa-arrow-right ms-1"></i>
                                    </button>
                                    <button id="submit-btn" class="btn btn-success d-none">
                                        <i class="fas fa-check me-1"></i>Submit Test
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.body.appendChild(quizContainer);

                startTimer();
                showQuestion();

                // Add event listeners
                document.getElementById('prev-btn').addEventListener('click', prevQuestion);
                document.getElementById('next-btn').addEventListener('click', nextQuestion);
                document.getElementById('submit-btn').addEventListener('click', submitQuiz);
            } else {
                alert(`Quiz for ${subject} ${level} is not available yet.`);
            }
        }

        function getQuestionSet(subject, level) {
            if (subject === 'Java') {
                if (level === 'Pre-Intermediate') return javaPreIntermediateQuestions;
                if (level === 'Intermediate') return javaIntermediateQuestions;
                if (level === 'Advanced') return javaAdvancedQuestions;
            }
            if (subject === 'SQL') {
                if (level === 'Pre-Intermediate') return sqlPreIntermediateQuestions;
                if (level === 'Intermediate') return sqlIntermediateQuestions;
                if (level === 'Advanced') return sqlAdvancedQuestions;
            }
            if (subject === 'Python') {
                if (level === 'Pre-Intermediate') return pythonPreIntermediateQuestions;
                if (level === 'Intermediate') return pythonIntermediateQuestions;
                if (level === 'Advanced') return pythonAdvancedQuestions;
            }
            if (subject === 'Git') {
                let bank = null;
                if (level === 'Pre-Intermediate') bank = gitPreIntermediateQuestions;
                if (level === 'Intermediate') bank = gitIntermediateQuestions;
                if (level === 'Advanced') bank = gitAdvancedQuestions;
                return bank ? randomizeQuizSet(bank, GIT_QUIZ_SIZE) : null;
            }
            return null;
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    submitQuiz();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerElement = document.getElementById('timer');
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (timeLeft < 300) { // Less than 5 minutes
                timerElement.classList.remove('bg-warning');
                timerElement.classList.add('bg-danger');
            }
        }

        function showQuestion() {
            const question = currentQuizQuestions[currentQuestionIndex];
            const questionContainer = document.getElementById('question-container');

            questionContainer.innerHTML = `
                <h4 class="mb-4">Question ${currentQuestionIndex + 1}</h4>
                <p class="lead mb-4">${question.question}</p>
                <div class="options-container">
                    ${question.options.map((option, index) => `
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="radio" name="answer" id="option${index}" value="${index}"
                                   ${userAnswers[currentQuestionIndex] === index ? 'checked' : ''}>
                            <label class="form-check-label" for="option${index}">
                                ${String.fromCharCode(65 + index)}. ${option}
                            </label>
                        </div>
                    `).join('')}
                </div>
            `;

            // Add event listeners to radio buttons
            document.querySelectorAll('input[name="answer"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    userAnswers[currentQuestionIndex] = parseInt(e.target.value);
                });
            });

            updateNavigationButtons();
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');
            const currentQuestionSpan = document.getElementById('current-question');

            currentQuestionSpan.textContent = currentQuestionIndex + 1;

            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.classList.toggle('d-none', currentQuestionIndex === currentQuizQuestions.length - 1);
            submitBtn.classList.toggle('d-none', currentQuestionIndex !== currentQuizQuestions.length - 1);
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuizQuestions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function submitQuiz() {
            clearInterval(timer);

            // Calculate results
            let correct = 0;
            currentQuizQuestions.forEach((question, index) => {
                if (userAnswers[index] === question.correct) {
                    correct++;
                }
            });

            const percentage = Math.round((correct / currentQuizQuestions.length) * 100);
            let grade, message, color;

            if (percentage >= 90) {
                grade = 'A';
                message = 'Excellent! You have outstanding Java knowledge.';
                color = 'text-success';
            } else if (percentage >= 80) {
                grade = 'B';
                message = 'Very Good! You have strong Java skills.';
                color = 'text-primary';
            } else if (percentage >= 70) {
                grade = 'C';
                message = 'Good! You have solid Java fundamentals.';
                color = 'text-warning';
            } else if (percentage >= 60) {
                grade = 'D';
                message = 'Fair! You need to strengthen your Java knowledge.';
                color = 'text-warning';
            } else {
                grade = 'F';
                message = 'Needs Improvement! Consider reviewing Java basics.';
                color = 'text-danger';
            }

            // Show results
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card test-card p-4 text-center">
                            <div class="card-body">
                                <div class="mb-4">
                                    <i class="fas fa-trophy fa-4x ${color.replace('text-', 'text-')} mb-3"></i>
                                    <h2 class="display-4 ${color} mb-2">${grade}</h2>
                                    <h3 class="mb-3">Test Complete!</h3>
                                    <p class="lead mb-2">${percentage}% (${correct}/${currentQuizQuestions.length})</p>
                                    <p class="mb-4">${message}</p>
                                </div>

                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <div class="card bg-light">
                                            <div class="card-body">
                                                <h5>Time Taken</h5>
                                                <p class="mb-0">${formatTime((currentLevel === 'Pre-Intermediate' ? 15 * 60 : 20 * 60) - timeLeft)}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="card bg-light">
                                            <div class="card-body">
                                                <h5>Questions Answered</h5>
                                                <p class="mb-0">${userAnswers.filter(answer => answer !== null).length}/${currentQuizQuestions.length}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5>Question Review:</h5>
                                    <div class="text-start bg-light p-3 rounded" style="max-height: 250px; overflow-y: auto;">
                                        ${currentQuizQuestions.map((q, i) => {
                                            const isCorrect = userAnswers[i] === q.correct;
                                            const userAnswerText = userAnswers[i] !== null ? q.options[userAnswers[i]] : 'No answer';
                                            const correctAnswerText = q.options[q.correct];
                                            return `
                                                <div class="mb-3 ${isCorrect ? 'text-success' : 'text-danger'}">
                                                    <div><strong>Q${i+1}:</strong> ${q.question}</div>
                                                    <div><strong>Correct:</strong> ${correctAnswerText}</div>
                                                    <div><strong>Your answer:</strong> ${userAnswerText}</div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>

                                <button class="btn btn-primary btn-lg" onclick="closeQuiz()">
                                    <i class="fas fa-home me-2"></i>Back to Tests
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function closeQuiz() {
            const quizContainer = document.getElementById('quiz-container');
            if (quizContainer) {
                quizContainer.remove();
            }

            // Show main content again
            document.querySelector('.page-header').style.display = 'block';
            document.querySelector('section.container').style.display = 'block';
            document.querySelector('footer').style.display = 'block';

            // Reset quiz state
            clearInterval(timer);
        }
    </script>

    <script>
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            if (window.scrollY > 200) btn.classList.add('show');
            else btn.classList.remove('show');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
