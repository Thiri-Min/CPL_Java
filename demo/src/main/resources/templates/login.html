<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #7f5af0 0%, #2a2a72 45%, #13111c 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        body::before, body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(10px);
            z-index: 0;
        }
        body::before {
            width: 340px;
            height: 340px;
            top: -80px;
            left: -60px;
            background: rgba(79, 172, 254, 0.35);
        }
        body::after {
            width: 420px;
            height: 420px;
            bottom: -140px;
            right: -80px;
            background: rgba(255, 111, 145, 0.3);
        }
        .navbar, .auth-wrap {
            position: relative;
            z-index: 1;
        }
        .auth-wrap {
            padding: 2.5rem 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 22px;
            box-shadow: 0 24px 40px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
            color: #fff;
            overflow: hidden;
        }
        .auth-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }
        .auth-subtitle {
            color: rgba(255, 255, 255, 0.85);
        }
        .form-label {
            color: rgba(255, 255, 255, 0.95);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }
        .form-control:focus {
            border-color: #7dd3fc;
            box-shadow: 0 0 0 0.2rem rgba(125, 211, 252, 0.3);
        }
        .btn-auth {
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border: 0;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 1rem;
        }
        .auth-footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            padding: 0.5rem 0 1.5rem;
        }
        .auth-footer a {
            color: #c4b5fd;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-50">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap me-2"></i>LMS
            </a>
        </div>
    </nav>

    <div class="auth-wrap">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="auth-card">
                        <div class="auth-header">
                            <h2 class="mb-2">Welcome</h2>
                        </div>

                        <div class="p-4 pt-2">
                            <div id="login-pane" th:if="${authMode == null || authMode == 'login'}">
                                <h4 class="mb-3">Login</h4>
                                <div th:if="${signupSuccess}" class="alert alert-success" th:text="${signupSuccess}"></div>
                                <div th:if="${loginError}" class="alert alert-danger" th:text="${loginError}"></div>
                                <form action="/login" method="post">
                                    <div class="mb-3">
                                        <label for="loginEmailOrUsername" class="form-label fw-semibold">Email or Username</label>
                                        <input id="loginEmailOrUsername" name="emailOrUsername" type="text" class="form-control" placeholder="Enter email or username" th:value="${loginEmailOrUsername}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label fw-semibold">Password</label>
                                        <input id="loginPassword" name="password" type="password" class="form-control" placeholder="Enter your password" required>
                                    </div>
                                    <button type="submit" class="btn btn-auth w-100">
                                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                    </button>
                                </form>
                                <div class="text-center mt-3">
                                    <span class="text-white-50">Don't have an account?</span>
                                    <a href="/signup" class="ms-1">Sign Up</a>
                                </div>
                            </div>

                            <div id="signup-pane" th:if="${authMode == 'signup'}">
                                <h4 class="mb-3">Create Account</h4>
                                <div th:if="${signupError}" class="alert alert-danger" th:text="${signupError}"></div>
                                <form action="/signup" method="post">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="firstName" class="form-label fw-semibold">First Name</label>
                                            <input id="firstName" name="firstName" type="text" class="form-control" placeholder="Enter first name" th:value="${signupFirstName}" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="lastName" class="form-label fw-semibold">Last Name</label>
                                            <input id="lastName" name="lastName" type="text" class="form-control" placeholder="Enter last name" th:value="${signupLastName}" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="signupUsername" class="form-label fw-semibold">Username</label>
                                            <input id="signupUsername" name="username" type="text" class="form-control" placeholder="Choose a username" th:value="${signupUsername}" pattern="[a-zA-Z0-9_]{3,30}" title="3–30 characters: letters, numbers, underscore" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="signupEmail" class="form-label fw-semibold">Email Address</label>
                                            <input id="signupEmail" name="email" type="email" class="form-control" placeholder="Enter your email" th:value="${signupEmail}" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="signupPassword" class="form-label fw-semibold">Password</label>
                                            <input id="signupPassword" name="password" type="password" class="form-control" placeholder="Create password" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                                            <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="Confirm password" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-auth w-100 mt-4">
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </form>
                                <div class="text-center mt-3">
                                    <span class="text-white-50">Already have an account?</span>
                                    <a href="/login" class="ms-1">Login</a>
                                </div>
                            </div>
                        </div>

                        <div class="auth-footer">
                            <a href="/">Back to Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
