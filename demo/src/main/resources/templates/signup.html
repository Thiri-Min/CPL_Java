<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Learning Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .signup-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            margin: 3rem 0;
        }
        .signup-header {
            background: linear-gradient(45deg, #4ECDC4, #667eea);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .btn-signup {
            background: linear-gradient(45deg, #4ECDC4, #667eea);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            padding: 0.75rem 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap me-2"></i>LMS
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="signup-container">
                    <div class="signup-header">
                        <i class="fas fa-user-plus fa-3x mb-3"></i>
                        <h2>Create Your Account</h2>
                        <p>Start learning with us today</p>
                    </div>
                    <div class="p-4 p-md-5">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form action="/signup" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="firstName">First Name</label>
                                    <input id="firstName" name="firstName" class="form-control" type="text" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="lastName">Last Name</label>
                                    <input id="lastName" name="lastName" class="form-control" type="text" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="username">Username</label>
                                    <input id="username" name="username" class="form-control" type="text" placeholder="3–30 chars: letters, numbers, _" pattern="[a-zA-Z0-9_]{3,30}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="email">Email</label>
                                    <input id="email" name="email" class="form-control" type="email" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="password">Password</label>
                                    <input id="password" name="password" class="form-control" type="password" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold" for="confirmPassword">Confirm Password</label>
                                    <input id="confirmPassword" name="confirmPassword" class="form-control" type="password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-signup w-100 mt-4">
                                <i class="fas fa-user-check me-2"></i>Sign Up
                            </button>
                        </form>
                        <div class="text-center mt-4">
                            <p class="mb-1">Already have an account? <a href="/login">Sign in here</a></p>
                            <a href="/" class="text-decoration-none">Back to Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
