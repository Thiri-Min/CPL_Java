<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Members</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
            font-family: Arial, sans-serif;
        }

        .team-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 25px;
        }

        .team-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .team-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #0d6efd;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .role-title {
            background: #0d6efd;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container py-5">

        <h2 class="text-center mb-4">Our Team</h2>

        <!-- Row 1: 4 members -->
        <div class="row">

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=12" class="team-photo">
                    <h5><a href="sarah">Sarah Lin</a> </h5>
                    <span class="role-title">Backend Developer</span>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=32" class="team-photo">
                    <h5><a href="kevin">Kevin Tan</a></h5>
                    <span class="role-title">Frontend Developer</span>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=15" class="team-photo">
                    <h5><a href="maria"> Maria Gomez</a></h5>
                    <span class="role-title">Database Manager</span>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=45" class="team-photo">
                    <h5>Daniel Park</h5>
                    <span class="role-title">Jira Manager</span>
                </div>
            </div>

        </div>

        <!-- Row 2: 3 members -->
        <div class="row justify-content-center">

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=18" class="team-photo">
                    <h5>Amy Chen</h5>
                    <span class="role-title">Tester</span>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=55" class="team-photo">
                    <h5>John Lee</h5>
                    <span class="role-title">Content Creator</span>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="team-card">
                    <img src="https://i.pravatar.cc/300?img=68" class="team-photo">
                    <h5>Kate Wilson</h5>
                    <span class="role-title">Reviewer</span>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
