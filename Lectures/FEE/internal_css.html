<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        h1 {
            color: rgb(207, 27, 177);
            text-align: center;
        }

        p {
            font-size: 18px;
            color: green;
        }

        button {
            background-color: orange;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(120, 72, 13);
        }
    </style>
</head>
<body>

    <h1>Welcome to FEE Module!</h1>

    <p>This is a paragraph styled with internal CSS.</p>

    <button>Click Me</button>

</body>
</html>
